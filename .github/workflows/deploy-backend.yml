# Auto-deploy the Filament backend (API + Caddy + coturn) to the droplet on push.
# The frontend deploys itself via Cloudflare Pages' git integration — not here.
#
# One-time setup (see deploy/README.md → "Auto-deploy"):
#   Repo secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY, DEPLOY_PATH
#                 (optional DROPLET_PORT, default 22)
#   On the droplet: deploy/.env must already exist (it holds the secrets).

name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

# Never let two deploys overlap.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO="https://github.com/Abdk4Moura/filament.git"
            DIR="${{ secrets.DEPLOY_PATH }}"

            # First run on a fresh droplet: clone. After that: fast-forward to main.
            if [ ! -d "$DIR/.git" ]; then
              git clone "$REPO" "$DIR"
            fi
            cd "$DIR"
            git fetch --depth=1 origin main
            git reset --hard origin/main

            if [ ! -f deploy/.env ]; then
              echo "::error::deploy/.env is missing on the droplet. Create it once (see deploy/README.md)."
              exit 1
            fi

            cd deploy
            docker compose up -d --build
            docker image prune -f
