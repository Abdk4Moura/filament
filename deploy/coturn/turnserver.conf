# Filament coturn — STUN + TURN.
# Dynamic values (static-auth-secret, realm, external-ip) are injected by
# docker-compose from .env, so they are NOT set here.

listening-port=3478
# tls-listening-port=5349        # enable for turns: (needs cert= / pkey= below)

fingerprint

# Time-limited credentials: the API mints username=<expiry> + HMAC(secret) per
# session (config.py _turn_servers). This must stay on and the secret must match
# FIL_TURN_SECRET handed to the API.
use-auth-secret

# Relay port range — OPEN THESE IN THE DROPLET FIREWALL (udp 49160-49200).
# Widen for more concurrent transfers.
min-port=49160
max-port=49200

# Hardening
no-multicast-peers
no-cli
no-tcp-relay
stale-nonce=600
user-quota=12
total-quota=1200

# Log to stdout so `docker compose logs coturn` shows activity.
log-file=stdout

# For turns: (TLS), point these at a cert (e.g. one issued for turn.<domain>):
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem
