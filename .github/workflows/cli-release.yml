# Build and attach filament CLI binaries to a GitHub release.
# Trigger: push a tag like cli-v0.1.0. The release process is exactly:
#
#     git tag cli-vX.Y.Z && git push origin cli-vX.Y.Z
#
# Everything else — matrix builds, SHA256SUMS, provenance attestation, the
# release itself — happens here. The curl|sh installer
# (https://filament.autumated.com/install), `filament update`, the Homebrew
# tap, and the winget manifests all consume these exact artifact names:
#     filament-<target>.tar.gz   (unix)   /  filament-<target>.zip (windows)
#     SHA256SUMS
# Ledger C16 / gap G-e: docs/cli-resilience.md.

name: cli-release

on:
  push:
    tags: ["cli-v*"]

permissions:
  contents: write
  id-token: write # provenance attestation
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: "--features static"
          - target: aarch64-apple-darwin
            os: macos-latest
            features: ""
          # Intel build cross-compiled from the arm64 runner: macos-13 (the
          # last Intel runner) is being retired and queues for ages.
          - target: x86_64-apple-darwin
            os: macos-latest
            features: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: ""
    steps:
      - uses: actions/checkout@v4
      - name: musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup target add ${{ matrix.target }}
      - name: Build
        working-directory: cli
        shell: bash
        run: |
          export FILAMENT_BUILD_SHA="${GITHUB_SHA::7}"
          export FILAMENT_BUILD_DATE="$(date -u +%Y-%m-%d)"
          cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *musl* ]]; then
            file "cli/target/${{ matrix.target }}/release/filament" | grep -qi "static" || { echo "not static!"; exit 1; }
          fi
          mkdir -p out
          cp "cli/target/${{ matrix.target }}/release/filament" out/
          tar -C out -czf "filament-${{ matrix.target }}.tar.gz" filament
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "cli/target/${{ matrix.target }}/release/filament.exe" -DestinationPath "filament-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target }}
          path: |
            filament-*.tar.gz
            filament-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          merge-multiple: true
      - name: Checksums
        run: |
          sha256sum filament-* > SHA256SUMS
          cat SHA256SUMS
      - name: Provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            filament-*
            SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # A tag with a hyphen (cli-v0.2.1-beta.1) is a PRERELEASE: GitHub
          # hides it from /releases/latest, and the installer + self-update
          # skip it unless explicitly opted in (FILAMENT_CHANNEL=beta /
          # `filament update --beta`).
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: |
            filament-*
            SHA256SUMS
          body: |
            ## Install

            **Linux / macOS** (verifies checksums, installs to `~/.local/bin`, no sudo):
            ```
            curl -fsSL https://filament.autumated.com/install | sh
            ```

            **Windows:**
            ```
            winget install Abdk4Moura.Filament
            ```

            **Homebrew:** `brew install abdk4moura/tap/filament` · **Cargo:** `cargo install filament-cli`

            Already installed? `filament update`

            ## Quick start
            ```
            filament send video.mp4 --code      # speak the code aloud
            filament recv clever-lynx-63        # …or open filament.autumated.com in any browser
            ```

            All binaries are checksummed (SHA256SUMS) and carry GitHub build
            provenance attestations. The Linux binary is fully static (musl).
