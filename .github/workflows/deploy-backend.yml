# Build the API image in CI (GitHub's runners) and have the droplet just PULL
# it — no build load on the droplet. Only the tiny api container is restarted;
# cloudflared, redis, and coturn are left running untouched.
#
# One-time setup (see deploy/README.md → "Auto-deploy"):
#   Repo secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY, DEPLOY_PATH
#                 (optional DROPLET_PORT, default 22)
#   Make the GHCR package `filament-api` public (so the droplet pulls w/o auth).
#   On the droplet: /opt/filament cloned + deploy/.env filled + stack up once.

name: Deploy backend

# Manual-only: droplet SSH secrets (DROPLET_HOST/USER/SSH_KEY/DEPLOY_PATH) are
# unset, so push-triggered runs failed every time ("missing server host").
# Deploys currently happen on the droplet via `docker compose`. Re-add the
# `push:` trigger once those repo secrets are configured.
on:
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/abdk4moura/filament-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/api.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull + restart api on the droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --depth=1 origin main
            git reset --hard origin/main
            cd deploy
            test -f .env || { echo "::error::deploy/.env missing (see deploy/README.md)"; exit 1; }
            # Pull the freshly built image; recreate ONLY api. Other services
            # (cloudflared, redis, coturn) keep running.
            docker compose pull api
            docker compose up -d --no-deps api
            docker image prune -f
