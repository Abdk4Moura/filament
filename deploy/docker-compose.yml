# Filament backend stack for the DigitalOcean droplet (shared box — stays small).
#   api        — Flask signaling (gunicorn+eventlet). NOT exposed to the host;
#                only reachable inside this compose network.
#   cloudflared— Cloudflare Tunnel: dials OUT to Cloudflare and routes
#                api.filament.autumated.com -> http://api:8000. Zero open ports.
#   coturn     — self-hosted STUN/TURN (host networking for the UDP relay range).
#
# Frontend is NOT here — it's static on Cloudflare Pages (see README.md).
# The image is built in CI and pushed to GHCR; the droplet only pulls it.
#
# Resource caps are env-driven (defaults below) so you can scale a single knob
# and redeploy just the api container:  API_MEM, API_CPUS, COTURN_MEM, ...
# Usage:  cp .env.example .env && edit .env && docker compose up -d

services:
  # Stateless behind Redis, so `docker compose up -d --scale api=N` (or
  # deploy/scale.sh N) spins replicas up/down in seconds. cloudflared
  # round-robins across them by the `api` service DNS name.
  api:
    image: ghcr.io/abdk4moura/filament-api:latest
    build: # only used for local builds; CI/droplet use the GHCR image
      context: ..
      dockerfile: deploy/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      FIL_ASYNC_MODE: eventlet
    expose:
      - "8000" # internal only — cloudflared reaches it as http://api:8000
    depends_on:
      - redis
    mem_limit: ${API_MEM:-220m}
    cpus: ${API_CPUS:-0.40}
    pids_limit: 256

  # Shared room registry + Socket.IO message queue for the api replicas.
  # Ephemeral (no persistence) — it's coordination state, not data.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${REDIS_MAXMEM:-64mb}
      - --maxmemory-policy
      - allkeys-lru
    mem_limit: ${REDIS_MEM:-96m}
    cpus: ${REDIS_CPUS:-0.20}

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - api
    mem_limit: ${CLOUDFLARED_MEM:-64m}
    cpus: ${CLOUDFLARED_CPUS:-0.20}

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    # Host networking so coturn can hand out its UDP relay port range directly.
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    # Secret/realm/IP come from .env so they live in exactly one place.
    # listening-ip pins coturn to the PUBLIC address only (avoids clashing with
    # tailscale and the docker bridges); alt-listening-port adds a :443 listener
    # (udp+tcp) so TURN passes strict mobile/corporate networks that block 3478.
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --static-auth-secret=${FIL_TURN_SECRET}
      - --realm=${TURN_REALM}
      - --external-ip=${DROPLET_IP}
      - --listening-ip=${DROPLET_IP}
      - --alt-listening-port=443
    mem_limit: ${COTURN_MEM:-96m}
    cpus: ${COTURN_CPUS:-0.50}
